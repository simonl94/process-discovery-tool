name: Build and deploy Node.js API to Azure Web App - process-discovery-tool

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Upload API artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-api
          path: server

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-api
          path: server

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8540C5309A8F4DB08CBE5E03D13379B3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_02FFF898BE914A2088D0F02C8EEBB714 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_70E3032D2FF74F60896E40357B783D9D }}

      - name: Deploy API to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'process-discovery-tool'
          slot-name: 'Production'
          package: ./server
          startup-command: 'npm start'
